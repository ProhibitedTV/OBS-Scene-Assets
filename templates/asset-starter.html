Category: overlays
Collection: core
UseCase: Short sentence describing the broadcast job this asset performs.
Resolution: 1920x1080
Transparent: true
Description: One sentence that explains the visual style and where the asset fits in a scene.
Tags: example, overlay, starter, template
Preview: previews/example/example-asset.png

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Example Asset Title</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --accent: #38bdf8;
      --accent-strong: #0ea5e9;
      --bg: rgba(15, 23, 42, 0.9);
      --panel: rgba(15, 23, 42, 0.72);
      --text: #f8fafc;
      --muted: rgba(248, 250, 252, 0.72);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top right, rgba(56, 189, 248, 0.18), transparent 28%),
        linear-gradient(145deg, #020617, #0f172a 60%, #111827);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    .card {
      width: min(90vw, 900px);
      padding: 2rem;
      border-radius: 1.5rem;
      border: 1px solid rgba(148, 163, 184, 0.24);
      background: var(--panel);
      box-shadow: 0 30px 60px rgba(2, 8, 23, 0.45);
      display: grid;
      gap: 1rem;
    }

    .eyebrow {
      margin: 0;
      font-size: 0.8rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .accent-bar {
      width: 100%;
      height: 0.5rem;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-strong));
    }
  </style>
</head>
<body>
  <main class="card">
    <!-- Editable copy: headline -->
    <p class="eyebrow" id="subtitle">Sample subtitle</p>
    <!-- Editable copy: title -->
    <h1 id="title">Example Asset Title</h1>
    <!-- Editable copy: supporting description -->
    <p id="body">Use this starter to build new overlays, scenes, widgets, and cards while keeping the metadata contract and customization hooks consistent.</p>
    <div class="accent-bar" aria-hidden="true"></div>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title');
    const subtitle = params.get('subtitle');
    const accent = params.get('accent');

    if (title) {
      document.getElementById('title').textContent = title;
    }

    if (subtitle) {
      document.getElementById('subtitle').textContent = subtitle;
    }

    if (accent) {
      document.documentElement.style.setProperty('--accent', accent);
    }

    // Optional scaffold for array-based content:
    // const items = (params.get('items') || '').split('|').map((item) => item.trim()).filter(Boolean);
  </script>
</body>
</html>
