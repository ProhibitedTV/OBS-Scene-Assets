<!DOCTYPE html>
<html lang=\"en\">
<head>
  <meta charset=\"UTF-8\" />
  <title>Top‑Bar Live Strip Overlay</title>
  <style>
    body{margin:0;background:transparent;}
    .bar{position:fixed;top:0;left:0;width:100%;height:80px;background:rgba(0,0,0,0.7);color:#fff;font-size:1.2rem;display:flex;align-items:center;padding:0 20px;}
    .dot{width:12px;height:12px;border-radius:50%;background:red;margin-right:8px;}
  </style>
</head>
<body>
  <div class=\"bar\"\u003e
    <div class=\"dot\"\u003e\u003c/div\u003e
    <span\u003eLive: Stream Title Here\u003c/span\u003e
  </div\u003e
</body>
</html>
