<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Countdown Timer Scene</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap');

    :root {
      --accent: #0ea5e9;
      --accent-soft: rgba(14, 165, 233, 0.18);
      --text: #e0f2fe;
      --muted: rgba(224, 242, 254, 0.72);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(14, 165, 233, 0.18), transparent 22%),
        radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.14), transparent 22%),
        linear-gradient(135deg, #000814, #001d3d 40%, #003566 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
    }

    .wrapper {
      display: grid;
      gap: 1.4rem;
      text-align: center;
      padding: 2rem;
    }

    .headline {
      text-transform: uppercase;
      letter-spacing: 0.28em;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .event {
      font-size: clamp(2rem, 4vw, 3.3rem);
      letter-spacing: -0.05em;
      font-weight: 700;
    }

    .timer {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 1rem;
    }

    .unit {
      padding: 1.6rem 1.4rem;
      border-radius: 18px;
      background: rgba(2, 6, 23, 0.45);
      border: 1px solid rgba(14, 165, 233, 0.4);
      box-shadow: 0 25px 45px rgba(0, 24, 61, 0.6);
    }

    .unit-value {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 0.1em;
    }

    .unit-label {
      text-transform: uppercase;
      letter-spacing: 0.3em;
      font-size: 0.75rem;
      opacity: 0.7;
    }

    .note {
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="headline" id="headline">Launch countdown</div>
    <div class="event" id="event">Countdown to Launch Party</div>
    <div class="timer">
      <div class="unit">
        <div class="unit-value" id="days">00</div>
        <div class="unit-label">Days</div>
      </div>
      <div class="unit">
        <div class="unit-value" id="hours">00</div>
        <div class="unit-label">Hours</div>
      </div>
      <div class="unit">
        <div class="unit-value" id="minutes">00</div>
        <div class="unit-label">Minutes</div>
      </div>
      <div class="unit">
        <div class="unit-value" id="seconds">00</div>
        <div class="unit-label">Seconds</div>
      </div>
    </div>
    <div class="note" id="note">Pass `timer=3600` or `timer=15:00` in the OBS Browser Source URL to customize this countdown without editing code.</div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title');
    const subtitle = params.get('subtitle');
    const headline = params.get('headline');
    const accent = params.get('accent');
    const timerParam = params.get('timer');

    if (title) {
      document.getElementById('event').textContent = title;
    }

    if (subtitle) {
      document.getElementById('note').textContent = subtitle;
    }

    if (headline) {
      document.getElementById('headline').textContent = headline;
    }

    if (accent) {
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--accent-soft', `${accent}22`);
    }

    function parseTimerValue(value) {
      if (!value) {
        return Date.now() + (36 * 60 * 60 * 1000);
      }

      if (/^\d+$/.test(value)) {
        return Date.now() + (Number(value) * 1000);
      }

      if (/^\d{1,2}:\d{2}$/.test(value)) {
        const [minutes, seconds] = value.split(':').map(Number);
        return Date.now() + (((minutes * 60) + seconds) * 1000);
      }

      if (/^\d{1,2}:\d{2}:\d{2}$/.test(value)) {
        const [hours, minutes, seconds] = value.split(':').map(Number);
        return Date.now() + ((((hours * 60) + minutes) * 60 + seconds) * 1000);
      }

      const parsedDate = new Date(value);
      return Number.isNaN(parsedDate.getTime()) ? Date.now() + (36 * 60 * 60 * 1000) : parsedDate.getTime();
    }

    const targetDate = parseTimerValue(timerParam);
    const daysEl = document.getElementById('days');
    const hoursEl = document.getElementById('hours');
    const minutesEl = document.getElementById('minutes');
    const secondsEl = document.getElementById('seconds');

    function updateTimer() {
      const diff = targetDate - Date.now();

      if (diff <= 0) {
        daysEl.textContent = '00';
        hoursEl.textContent = '00';
        minutesEl.textContent = '00';
        secondsEl.textContent = '00';
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      daysEl.textContent = String(days).padStart(2, '0');
      hoursEl.textContent = String(hours).padStart(2, '0');
      minutesEl.textContent = String(minutes).padStart(2, '0');
      secondsEl.textContent = String(seconds).padStart(2, '0');
    }

    updateTimer();
    setInterval(updateTimer, 1000);
  </script>
</body>
</html>
