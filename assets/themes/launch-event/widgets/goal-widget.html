<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Launch Event Goal Widget</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --accent: #a855f7;
      --accent-secondary: #ec4899;
      --accent-tertiary: #f97316;
      --text: #fdf4ff;
      --muted: rgba(253, 244, 255, 0.78);
      --line: rgba(253, 244, 255, 0.16);
      --surface: rgba(34, 12, 44, 0.74);
      --surface-strong: rgba(34, 12, 44, 0.92);
      --shadow: rgba(2, 6, 23, 0.42);
      --glow: rgba(168, 85, 247, 0.32);
      --bg-start: #12051a;
      --bg-mid: #230b34;
      --bg-end: #1a0912;
      --wash-a: rgba(168, 85, 247, 0.22);
      --wash-b: rgba(236, 72, 153, 0.18);
      --wash-c: rgba(249, 115, 22, 0.18);
  
      --progress: 0.68;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: transparent;
      display: grid;
      place-items: center;
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    .widget {
      width: min(92vw, 860px);
      padding: 1rem 1.1rem;
      border-radius: 1.35rem;
      border: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(168, 85, 247, 0.14), rgba(236, 72, 153, 0.08)), var(--surface-strong);
      box-shadow: 0 18px 42px var(--shadow);
      display: grid;
      gap: 0.8rem;
    }

    .head,
    .foot {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
    }

    .subtitle,
    .foot {
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .title {
      margin-top: 0.25rem;
      font-size: 1.28rem;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .numbers strong {
      display: block;
      font-size: 1.28rem;
      letter-spacing: -0.04em;
      text-align: right;
    }

    .track {
      height: 1rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .fill {
      width: calc(var(--progress) * 100%);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-secondary), var(--accent-tertiary));
    }
  </style>
</head>
<body>
  <div class="widget">
    <div class="head">
      <div>
        <div class="subtitle" id="subtitle">Launch Event Suite</div>
        <div class="title" id="title">Push toward the next launch milestone</div>
      </div>
      <div class="numbers">
        <strong id="numbers">1496 / 1916</strong>
        <div class="subtitle" id="headline">68% complete</div>
      </div>
    </div>
    <div class="track"><div class="fill"></div></div>
    <div class="foot">
      <span>High-clarity assets for reveal moments</span>
      <span>Shared params ready</span>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title');
    const subtitle = params.get('subtitle');
    const headline = params.get('headline');
    const accent = params.get('accent');
    const current = Number(params.get('current'));
    const goal = Number(params.get('goal'));
    if (title) document.getElementById('title').textContent = title;
    if (subtitle) document.getElementById('subtitle').textContent = subtitle;
    if (accent) {
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--accent-secondary', accent);
      document.documentElement.style.setProperty('--accent-tertiary', accent);
    }
    if (!Number.isNaN(current) && !Number.isNaN(goal) && goal > 0) {
      const progress = Math.min(1, current / goal);
      document.documentElement.style.setProperty('--progress', String(progress));
      document.getElementById('numbers').textContent = current.toLocaleString() + ' / ' + goal.toLocaleString();
      document.getElementById('headline').textContent = Math.round(progress * 100) + '% complete';
    } else if (headline) {
      document.getElementById('headline').textContent = headline;
    }
  </script>
</body>
</html>
