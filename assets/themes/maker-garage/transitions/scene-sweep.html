<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Maker Garage Scene Sweep Transition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --accent: #f97316;
      --accent-secondary: #06b6d4;
      --accent-tertiary: #84cc16;
      --text: #fff7ed;
      --muted: rgba(255, 247, 237, 0.78);
      --line: rgba(255, 247, 237, 0.16);
      --surface: rgba(34, 20, 10, 0.72);
      --surface-strong: rgba(34, 20, 10, 0.92);
      --shadow: rgba(2, 6, 23, 0.42);
      --glow: rgba(249, 115, 22, 0.32);
      --bg-start: #110b07;
      --bg-mid: #2c1c12;
      --bg-end: #0b1c21;
      --wash-a: rgba(249, 115, 22, 0.22);
      --wash-b: rgba(6, 182, 212, 0.18);
      --wash-c: rgba(132, 204, 22, 0.18);
  
    }

    body {
      margin: 0;
      min-height: 100vh;

      background:
        radial-gradient(circle at 16% 18%, var(--wash-a), transparent 28%),
        radial-gradient(circle at 82% 18%, var(--wash-b), transparent 30%),
        radial-gradient(circle at 70% 78%, var(--wash-c), transparent 28%),
        linear-gradient(145deg, var(--bg-start), var(--bg-mid) 58%, var(--bg-end));
  
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
      text-transform: uppercase;
    }

    .panel {
      position: relative;
      width: min(86vw, 900px);
      padding: 3rem 2rem;
      border-radius: 2rem;
      border: 2px solid rgba(249, 115, 22, 0.45);
      background: rgba(2, 6, 23, 0.22);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 56px var(--shadow);
      text-align: center;
      overflow: hidden;
    }

    .panel::before,
    .panel::after {
      content: "";
      position: absolute;
      inset: -20%;
      background: linear-gradient(90deg, transparent, rgba(249, 115, 22, 0.22), transparent);
      animation: sweep 2.1s ease-in-out infinite;
      transform: rotate(18deg);
    }

    .panel::after {
      background: linear-gradient(90deg, transparent, rgba(6, 182, 212, 0.18), transparent);
      animation-delay: 0.55s;
      transform: rotate(-18deg);
    }

    h1 {
      position: relative;
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      letter-spacing: 0.18em;
    }

    p {
      position: relative;
      margin: 1rem 0 0;
      font-size: 0.88rem;
      letter-spacing: 0.22em;
      color: var(--muted);
    }

    @keyframes sweep {
      0% { transform: translateX(-45%) rotate(18deg); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateX(45%) rotate(18deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1 id="title">Maker Garage Scene Sweep</h1>
    <p id="headline">Practical framing for build streams and workshop demos</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title');
    const headline = params.get('headline');
    const accent = params.get('accent');
    if (title) document.getElementById('title').textContent = title;
    if (headline) document.getElementById('headline').textContent = headline;
    if (accent) {
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--accent-secondary', accent);
    }
  </script>
</body>
</html>
