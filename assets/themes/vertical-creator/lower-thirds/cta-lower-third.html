<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vertical Creator CTA Lower Third</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&display=swap');

    :root {
      --accent: #2563eb;
      --accent-secondary: #f59e0b;
      --text: #f8fafc;
      --muted: rgba(226, 232, 240, 0.74);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: transparent;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0 4vw 4vh;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
    }

    .banner {
      width: min(92vw, 980px);
      border-radius: 1.45rem;
      padding: 1rem 1.05rem;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0.9rem;
      align-items: center;
      background:
        linear-gradient(135deg, rgba(37, 99, 235, 0.86), rgba(245, 158, 11, 0.78)),
        rgba(15, 23, 42, 0.9);
      box-shadow: 0 18px 40px rgba(2, 8, 23, 0.32);
    }

    .marker {
      width: 42px;
      height: 42px;
      border-radius: 1rem;
      background: rgba(255, 255, 255, 0.18);
      display: grid;
      place-items: center;
      font-weight: 700;
    }

    .copy {
      display: grid;
      gap: 0.2rem;
    }

    .title {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .subtitle {
      font-size: 0.88rem;
      color: rgba(248, 250, 252, 0.88);
      line-height: 1.45;
    }

    .chip {
      padding: 0.55rem 0.75rem;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.32);
      border: 1px solid rgba(255, 255, 255, 0.16);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="marker" id="marker">01</div>
    <div class="copy">
      <div class="title" id="title">Follow for the next live</div>
      <div class="subtitle" id="subtitle">Use a clean creator CTA that still reads well on portrait streams and mobile playback.</div>
    </div>
    <div class="chip" id="chip">New upload tonight</div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title');
    const subtitle = params.get('subtitle');
    const accent = params.get('accent');
    const headline = params.get('headline');

    if (title) {
      document.getElementById('title').textContent = title;
    }

    if (subtitle) {
      document.getElementById('subtitle').textContent = subtitle;
    }

    if (headline) {
      document.getElementById('chip').textContent = headline;
    }

    if (accent) {
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--accent-secondary', accent);
      document.querySelector('.banner').style.background = `linear-gradient(135deg, ${accent}, rgba(15, 23, 42, 0.86))`;
    }
  </script>
</body>
</html>
