<!--

Category: widgets

UseCase: Portrait chat sidebar for creator live scenes, comments walls, and mobile-first reaction layouts.

Transparent: true
Description: Slim translucent chat column with creator-highlight styling that fits beside a portrait camera feed or full-screen vertical scene.

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vertical Creator Chat Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700&display=swap');

    :root {
      --accent: #14b8a6;
      --text: #f8fafc;
      --muted: rgba(226, 232, 240, 0.72);
      --panel: rgba(6, 14, 28, 0.74);
      --line: rgba(226, 232, 240, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: transparent;
      display: flex;
      align-items: stretch;
      justify-content: flex-end;
      padding: 5vh 3vw;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--text);
    }

    .panel {
      width: min(92vw, 460px);
      display: grid;
      gap: 0.9rem;
      padding: 1rem;
      border-radius: 1.5rem;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 48px rgba(2, 8, 23, 0.28);
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
    }

    .label {
      font-size: 0.76rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .messages {
      display: grid;
      gap: 0.7rem;
    }

    .message {
      display: grid;
      gap: 0.3rem;
      padding: 0.85rem 0.9rem;
      border-radius: 1.1rem;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .message strong {
      font-size: 0.88rem;
    }

    .message span {
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.84rem;
    }

    .message.featured {
      border-color: rgba(20, 184, 166, 0.38);
      box-shadow: inset 0 0 0 1px rgba(20, 184, 166, 0.16);
    }
  </style>
</head>
<body>
  <aside class="panel">
    <div class="panel-head">
      <div>
        <div class="label" id="subtitle">Live chat</div>
        <strong id="title">Comment wall</strong>
      </div>
      <span class="label" id="headline">Tap in early</span>
    </div>
    <div class="messages" id="messages">
      <article class="message featured">
        <strong>@clipqueen</strong>
        <span>That intro ring is clean. Need the setup recipe for this layout.</span>
      </article>
      <article class="message">
        <strong>@nightmodeedits</strong>
        <span>Saving this for the next portrait interview stream.</span>
      </article>
      <article class="message">
        <strong>@loopstationlive</strong>
        <span>Drop the next prompt in chat and I am clipping it for later.</span>
      </article>
    </div>
  </aside>
  <script>
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title');
    const subtitle = params.get('subtitle');
    const accent = params.get('accent');
    const headline = params.get('headline');
    const items = params.get('items');

    if (title) {
      document.getElementById('title').textContent = title;
    }

    if (subtitle) {
      document.getElementById('subtitle').textContent = subtitle;
    }

    if (headline) {
      document.getElementById('headline').textContent = headline;
    }

    if (accent) {
      document.documentElement.style.setProperty('--accent', accent);
    }

    if (items) {
      const messages = document.getElementById('messages');
      messages.innerHTML = '';
      items
        .split('|')
        .map((entry) => entry.trim())
        .filter(Boolean)
        .forEach((entry, index) => {
          const [author, message] = entry.split('::');
          const article = document.createElement('article');
          article.className = `message${index === 0 ? ' featured' : ''}`;
          article.innerHTML = `<strong>${author || '@viewer'}</strong><span>${message || 'Add chat copy with the items parameter.'}</span>`;
          messages.appendChild(article);
        });
    }
  </script>
</body>
</html>
