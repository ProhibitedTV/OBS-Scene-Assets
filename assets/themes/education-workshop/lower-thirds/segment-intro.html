<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Education Workshop Segment Intro Lower Third</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --accent: #38bdf8;
      --accent-secondary: #14b8a6;
      --accent-tertiary: #a3e635;
      --text: #ecfeff;
      --muted: rgba(236, 254, 255, 0.78);
      --line: rgba(236, 254, 255, 0.16);
      --surface: rgba(8, 31, 46, 0.72);
      --surface-strong: rgba(8, 31, 46, 0.92);
      --shadow: rgba(2, 6, 23, 0.42);
      --glow: rgba(56, 189, 248, 0.32);
      --bg-start: #051018;
      --bg-mid: #0b2232;
      --bg-end: #0b1717;
      --wash-a: rgba(56, 189, 248, 0.22);
      --wash-b: rgba(20, 184, 166, 0.18);
      --wash-c: rgba(163, 230, 53, 0.18);
  
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: transparent;
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
      display: grid;
      align-items: end;
      padding: 0 3vw 3vw;
    }

    .lower-third {
      width: min(90vw, 1420px);
      padding: 1rem;
      border-radius: 1.6rem;
      border: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(56, 189, 248, 0.16), rgba(20, 184, 166, 0.1)), var(--surface-strong);
      box-shadow: 0 22px 48px var(--shadow);
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 1rem;
      align-items: center;
    }

    .accent {
      width: 0.8rem;
      align-self: stretch;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--accent), var(--accent-secondary), var(--accent-tertiary));
    }

    .eyebrow {
      margin: 0 0 0.35rem;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.7rem);
      line-height: 1;
      letter-spacing: -0.05em;
    }

    p {
      margin: 0.45rem 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .headline {
      padding: 0.9rem 1rem;
      border-radius: 1.1rem;
      background: rgba(255, 255, 255, 0.07);
      min-width: 240px;
      font-size: 0.84rem;
      line-height: 1.5;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="lower-third">
    <div class="accent" aria-hidden="true"></div>
    <div>
      <p class="eyebrow" id="subtitle">Education Workshop Suite</p>
      <h1 id="title">Session plan at a glance</h1>
      <p id="description">A flexible lower third for tutorial streams, live classes, coaching sessions, and build-along workshops.</p>
    </div>
    <div class="headline" id="headline">Share a module, worksheet, or live challenge</div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title');
    const subtitle = params.get('subtitle');
    const headline = params.get('headline');
    const accent = params.get('accent');
    if (title) document.getElementById('title').textContent = title;
    if (subtitle) document.getElementById('subtitle').textContent = subtitle;
    if (headline) document.getElementById('headline').textContent = headline;
    if (accent) {
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--accent-secondary', accent);
      document.documentElement.style.setProperty('--accent-tertiary', accent);
    }
  </script>
</body>
</html>
