<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Creator Commerce FAQ Answer Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --accent: #fb7185;
      --accent-2: #f97316;
      --accent-3: #facc15;
      --text: #f8fafc;
      --muted: rgba(226, 232, 240, 0.8);
      --line: rgba(255, 255, 255, 0.16);
      --panel: rgba(9, 13, 24, 0.82);
      --panel-strong: rgba(7, 10, 20, 0.92);
      --shadow: rgba(2, 8, 23, 0.36);
      --bg-1: #15090f;
      --bg-2: #2c111c;
      --bg-3: #432116;
      --bg-4: #230d0a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      color: var(--text);
      background: transparent;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    .shell {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
    }

    .scenic {
      background:
        radial-gradient(circle at 14% 16%, rgba(255, 255, 255, 0.08), transparent 22%),
        radial-gradient(circle at 86% 18%, rgba(255, 255, 255, 0.08), transparent 24%),
        radial-gradient(circle at 70% 82%, color-mix(in srgb, var(--accent-2) 22%, transparent), transparent 26%),
        radial-gradient(circle at 18% 78%, color-mix(in srgb, var(--accent) 20%, transparent), transparent 28%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2) 42%, var(--bg-3) 76%, var(--bg-4));
    }

    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.22;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 2.25rem 2.25rem;
      mask-image: radial-gradient(circle at center, rgba(0, 0, 0, 0.96), transparent 88%);
    }

    .orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(14px);
      opacity: 0.42;
      animation: drift 8s ease-in-out infinite;
    }

    .orb.one {
      top: -8rem;
      right: -6rem;
      width: 24rem;
      height: 24rem;
      background: color-mix(in srgb, var(--accent) 32%, transparent);
    }

    .orb.two {
      bottom: -7rem;
      left: -5rem;
      width: 20rem;
      height: 20rem;
      background: color-mix(in srgb, var(--accent-2) 28%, transparent);
      animation-delay: 1.2s;
    }

    .orb.three {
      top: 36%;
      left: 48%;
      width: 18rem;
      height: 18rem;
      background: color-mix(in srgb, var(--accent-3) 18%, transparent);
      animation-delay: 2.2s;
    }

    .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: 0 28px 60px var(--shadow);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      width: fit-content;
      padding: 0.46rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.08);
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .display-title {
      margin: 0;
      letter-spacing: -0.05em;
      line-height: 0.95;
    }

    .copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.58;
    }

    .accent-line {
      width: 5.2rem;
      height: 0.28rem;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2), var(--accent-3));
    }

    .chip-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 0.52rem 0.82rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.07);
      font-size: 0.88rem;
      color: var(--muted);
    }

    .list-stack {
      display: grid;
      gap: 0.7rem;
    }

    .list-row {
      padding: 0.88rem 1rem;
      border-radius: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      font-size: 0.96rem;
      line-height: 1.45;
    }

    .stat-grid {
      display: grid;
      gap: 0.85rem;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .stat-card {
      padding: 0.92rem 1rem;
      border-radius: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      display: grid;
      gap: 0.2rem;
    }

    .stat-card strong {
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stat-card span {
      font-size: 1rem;
      font-weight: 700;
    }

    .timer-card {
      width: fit-content;
      padding: 0.78rem 1rem;
      border-radius: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.08);
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .ticker-shell {
      display: grid;
      grid-template-columns: auto auto 1fr;
      align-items: center;
      gap: 1rem;
      overflow: hidden;
    }

    .ticker-label {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
    }

    .ticker-window {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
    }

    .ticker-track {
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      white-space: nowrap;
      animation: marquee 24s linear infinite;
    }

    .ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.46rem 0.82rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--muted);
      font-size: 0.92rem;
    }

    .frame-corner {
      position: absolute;
      width: 7rem;
      height: 7rem;
      border-color: color-mix(in srgb, var(--accent) 62%, white 18%);
      border-style: solid;
      opacity: 0.95;
    }

    .frame-corner.tl {
      top: 1.4rem;
      left: 1.4rem;
      border-width: 0.28rem 0 0 0.28rem;
      border-radius: 1.5rem 0 0 0;
    }

    .frame-corner.tr {
      top: 1.4rem;
      right: 1.4rem;
      border-width: 0.28rem 0.28rem 0 0;
      border-radius: 0 1.5rem 0 0;
    }

    .frame-corner.bl {
      bottom: 1.4rem;
      left: 1.4rem;
      border-width: 0 0 0.28rem 0.28rem;
      border-radius: 0 0 0 1.5rem;
    }

    .frame-corner.br {
      bottom: 1.4rem;
      right: 1.4rem;
      border-width: 0 0.28rem 0.28rem 0;
      border-radius: 0 0 1.5rem 0;
    }

    .frame-tag {
      position: absolute;
      padding: 0.48rem 0.82rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(7, 10, 20, 0.72);
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .frame-tag.top {
      top: 1.75rem;
      left: 50%;
      transform: translateX(-50%);
    }

    .frame-tag.bottom {
      bottom: 1.75rem;
      left: 50%;
      transform: translateX(-50%);
    }

    @keyframes drift {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(0, 1rem, 0) scale(1.06); }
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="grain"></div>
    <article class="panel" style="position:absolute;right:1.2rem;top:1.2rem;width:min(31rem,34vw);padding:1.25rem;border-radius:1.45rem;display:grid;gap:0.85rem;animation:rise .7s ease both;">
      <div class="pill" id="headline">Quick Answers</div>
      <h1 class="display-title" id="title" style="font-size:clamp(1.4rem,2.1vw,2.15rem);">Offer FAQ</h1>
      <div class="accent-line"></div>
      <p class="copy" id="subtitle">Pin this when the audience needs order answers without killing the sales rhythm.</p>
      <div class="list-stack" id="items">
          <div class="list-row">Delivery window: 2 business days</div>
          <div class="list-row">Refunds: see checkout page</div>
          <div class="list-row">DM support for custom bundles</div>
      </div>
    </article>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const read = (key, fallback) => {
      const value = params.get(key);
      return value && value.trim() ? value.trim() : fallback;
    };
    const setText = (id, value) => {
      const target = document.getElementById(id);
      if (target) {
        target.textContent = value;
      }
    };
    const accent = read('accent', '');
    if (accent) {
      document.documentElement.style.setProperty('--accent', accent);
    }

    setText('headline', read('headline', "Quick Answers"));
    setText('title', read('title', "Offer FAQ"));
    setText('subtitle', read('subtitle', "Pin this when the audience needs order answers without killing the sales rhythm."));
    const readItems = (fallback) => {
      const raw = params.get('items');
      if (!raw) return fallback;
      return raw.split('|').map((item) => item.trim()).filter(Boolean);
    };
    const renderItems = (id, values) => {
      const target = document.getElementById(id);
      if (!target) return;
      target.innerHTML = '';
      values.forEach((value) => {
        const row = document.createElement('div');
        row.className = 'list-row';
        row.textContent = value;
        target.appendChild(row);
      });
    };
    renderItems('items', readItems(["Delivery window: 2 business days","Refunds: see checkout page","DM support for custom bundles"]));

  </script>
</body>
</html>
