<!--
Title: Creator Commerce Product Spec Overlay
Category: overlays
Collection: creator-commerce
UseCase: Transparent spec overlay for highlighting features, sizing, or bundle details during product spotlights.
Resolution: 1920x1080
Transparent: true
Description: Clean spec card for quick product details during live shopping or merch walkthroughs.
Tags: creator-commerce, overlays, product-spec-overlay, white-label, easy-mode, novice-friendly
Preview: previews/themes/creator-commerce/overlays/product-spec-overlay.png
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Creator Commerce Product Spec Overlay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --accent: #fb7185;
      --accent-2: #8b5cf6;
      --accent-3: #f59e0b;
      --text: #fff7fb;
      --muted: rgba(251, 207, 232, 0.82);
      --panel: rgba(38, 10, 28, 0.86);
      --line: rgba(251, 207, 232, 0.16);
      --bg-1: #130712;
      --bg-2: #2f1130;
      --bg-3: #22130b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: var(--text);
      background: transparent;
    }

    .shell {
      min-height: 100vh;
      padding: 2.2rem;
      display: grid;
      grid-template-columns: 1fr 340px;
      grid-template-rows: auto 1fr auto;
      gap: 1rem;
      grid-template-areas:
        "header side"
        "frame side"
        "foot side";
    }

    .panel {
      border-radius: 1.35rem;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel) 84%, transparent);
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 40px rgba(2, 8, 23, 0.2);
    }

    .header {
      grid-area: header;
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
      padding: 1rem 1.1rem;
    }

    .eyebrow {
      margin: 0;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0.28rem 0 0;
      font-size: clamp(1.8rem, 4vw, 2.9rem);
      letter-spacing: -0.05em;
    }

    .headline {
      padding: 0.72rem 0.9rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      font-size: 0.82rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .frame {
      grid-area: frame;
      position: relative;
      overflow: hidden;
      border-radius: 1.9rem;
      border: 2px solid color-mix(in srgb, var(--accent) 65%, transparent);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent-2) 45%, transparent);
    }

    .frame::before {
      content: '';
      position: absolute;
      inset: 1rem;
      border-radius: 1.25rem;
      border: 1px dashed color-mix(in srgb, var(--accent-2) 42%, transparent);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
    }

    .frame-tag {
      position: absolute;
      top: 1.3rem;
      left: 1.3rem;
      padding: 0.6rem 0.78rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .side {
      grid-area: side;
      padding: 1rem;
      display: grid;
      gap: 0.8rem;
      align-content: start;
    }

    .item {
      padding: 0.9rem;
      border-radius: 1rem;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid color-mix(in srgb, var(--accent) 18%, transparent);
      color: var(--muted);
      line-height: 1.55;
    }

    .foot {
      grid-area: foot;
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      padding: 0.9rem 1rem;
    }

    .foot span {
      padding: 0.55rem 0.8rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header panel">
      <div>
        <p class="eyebrow" data-subtitle>Creator Commerce Suite</p>
        <h1 data-title>Featured product specs</h1>
      </div>
      <div class="headline" data-headline>Simple details for live product callouts</div>
    </div>
    <div class="frame" aria-label="Featured product specs">
      <div class="frame-tag" data-channel>Northwind Live</div>
    </div>
    <div class="side panel" data-items data-item-tag="div" data-item-class="item">
      <div class="item">Soft cotton blend</div><div class="item">Available in 4 colors</div><div class="item">Ships in 3 to 5 business days</div>
    </div>
    <div class="foot panel">
      <span data-handle>@northwindlive</span>
      <span data-cta>Ready out of the box</span>
      <span>Drop in your own labels and go</span>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title');
    const subtitle = params.get('subtitle');
    const headline = params.get('headline');
    const channel = params.get('channel');
    const username = params.get('username');
    const handle = params.get('handle');
    const cta = params.get('cta');
    const timer = params.get('timer');
    const accent = params.get('accent');
    const items = params.get('items');

    if (title) document.querySelectorAll('[data-title]').forEach((node) => node.textContent = title);
    if (subtitle) document.querySelectorAll('[data-subtitle]').forEach((node) => node.textContent = subtitle);
    if (headline) document.querySelectorAll('[data-headline]').forEach((node) => node.textContent = headline);
    if (channel) document.querySelectorAll('[data-channel]').forEach((node) => node.textContent = channel);
    if (username) document.querySelectorAll('[data-username]').forEach((node) => node.textContent = username);
    if (handle) document.querySelectorAll('[data-handle]').forEach((node) => node.textContent = handle);
    if (cta) document.querySelectorAll('[data-cta]').forEach((node) => node.textContent = cta);
    if (timer) document.querySelectorAll('[data-timer]').forEach((node) => node.textContent = timer);
    if (accent) {
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--accent-2', accent);
      document.documentElement.style.setProperty('--accent-3', accent);
    }
    if (items) {
      const entries = items.split('|').map((entry) => entry.trim()).filter(Boolean);
      const list = document.querySelector('[data-items]');
      if (list) {
        list.innerHTML = '';
        entries.forEach((entry) => {
          const node = document.createElement(list.dataset.itemTag || 'div');
          node.className = list.dataset.itemClass || 'item';
          node.textContent = entry;
          list.appendChild(node);
        });
      }
    }
  </script>
</body>
</html>
