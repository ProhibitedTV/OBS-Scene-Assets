<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Civic Broadcast Supporter Surge Alert</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --accent: #60a5fa;
      --accent-secondary: #ef4444;
      --accent-tertiary: #f59e0b;
      --text: #eff6ff;
      --muted: rgba(239, 246, 255, 0.78);
      --line: rgba(239, 246, 255, 0.16);
      --surface: rgba(13, 23, 43, 0.72);
      --surface-strong: rgba(13, 23, 43, 0.92);
      --shadow: rgba(2, 6, 23, 0.42);
      --glow: rgba(96, 165, 250, 0.32);
      --bg-start: #08101c;
      --bg-mid: #11223f;
      --bg-end: #24120f;
      --wash-a: rgba(96, 165, 250, 0.22);
      --wash-b: rgba(239, 68, 68, 0.18);
      --wash-c: rgba(245, 158, 11, 0.18);
  
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: transparent;
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    .alert {
      position: relative;
      width: min(92vw, 760px);
      padding: 1.35rem;
      border-radius: 1.5rem;
      border: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(96, 165, 250, 0.18), rgba(239, 68, 68, 0.12)),
        var(--surface-strong);
      box-shadow: 0 22px 48px var(--shadow);
      overflow: hidden;
      display: grid;
      gap: 1rem;
    }

    .alert::before,
    .alert::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      inset: auto;
      pointer-events: none;
    }

    .alert::before {
      width: 240px;
      height: 240px;
      top: -90px;
      right: -60px;
      background: rgba(96, 165, 250, 0.2);
      animation: pulse 3s ease-in-out infinite;
    }

    .alert::after {
      width: 170px;
      height: 170px;
      bottom: -60px;
      left: -40px;
      background: rgba(239, 68, 68, 0.18);
      animation: pulse 3s ease-in-out infinite 0.7s;
    }

    .eyebrow,
    .headline {
      position: relative;
      z-index: 1;
      width: fit-content;
      padding: 0.5rem 0.8rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      max-width: 12ch;
      font-size: clamp(2rem, 5vw, 3.1rem);
      line-height: 0.96;
      letter-spacing: -0.05em;
    }

    p {
      position: relative;
      z-index: 1;
      margin: 0;
      max-width: 44ch;
      color: var(--muted);
      line-height: 1.6;
    }

    .meter {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.45rem;
    }

    .meter span {
      height: 0.6rem;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
      animation: rise 1.4s ease-in-out infinite;
    }

    .meter span:nth-child(2) { animation-delay: 0.12s; }
    .meter span:nth-child(3) { animation-delay: 0.24s; }
    .meter span:nth-child(4) { animation-delay: 0.36s; }

    @keyframes pulse {
      0%, 100% { transform: scale(0.92); opacity: 0.65; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    @keyframes rise {
      0%, 100% { transform: scaleY(0.7); opacity: 0.7; }
      50% { transform: scaleY(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="alert">
    <div class="eyebrow" id="subtitle">Civic Broadcast Suite</div>
    <h1 id="title">New update on deck</h1>
    <div class="headline" id="headline">A fresh talking point just landed.</div>
    <p id="description">Built for analysis streams, issue explainers, live reactions, and public-interest creator coverage while staying broad enough to reuse across many white-label creator brands.</p>
    <div class="meter" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title');
    const subtitle = params.get('subtitle');
    const headline = params.get('headline');
    const accent = params.get('accent');
    if (title) document.getElementById('title').textContent = title;
    if (subtitle) document.getElementById('subtitle').textContent = subtitle;
    if (headline) document.getElementById('headline').textContent = headline;
    if (accent) {
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--accent-secondary', accent);
    }
  </script>
</body>
</html>
