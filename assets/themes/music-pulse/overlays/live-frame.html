<!--
Title: Music Pulse Live Frame Overlay
Category: overlays
Collection: music-pulse
UseCase: Full-frame overlay for commentary, facecam, or main presentation scenes in DJ sets, beat-making sessions, listening parties, and performance-led creator streams.
Resolution: 1920x1080
Transparent: true
Description: Transparent live frame with a modular header and sidebar notes tailored to music pulse coverage.
Tags: dj, music, performance, release, set, white-label, frame, live, overlay, overlays, music-pulse
Preview: previews/themes/music-pulse/overlays/live-frame.png
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Music Pulse Live Frame Overlay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --accent: #22d3ee;
      --accent-secondary: #8b5cf6;
      --accent-tertiary: #f43f5e;
      --text: #f5f3ff;
      --muted: rgba(245, 243, 255, 0.78);
      --line: rgba(245, 243, 255, 0.16);
      --surface: rgba(17, 16, 44, 0.72);
      --surface-strong: rgba(17, 16, 44, 0.9);
      --shadow: rgba(2, 6, 23, 0.42);
      --glow: rgba(34, 211, 238, 0.32);
      --bg-start: #090711;
      --bg-mid: #151339;
      --bg-end: #130816;
      --wash-a: rgba(34, 211, 238, 0.22);
      --wash-b: rgba(139, 92, 246, 0.18);
      --wash-c: rgba(244, 63, 94, 0.18);
  
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: transparent;
      color: var(--text);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    .shell {
      min-height: 100vh;
      padding: 2.2rem;
      display: grid;
      grid-template-columns: 1fr 0.32fr;
      grid-template-rows: auto 1fr auto;
      gap: 1rem;
      grid-template-areas:
        "header sidebar"
        "frame sidebar"
        "footer sidebar";
    }

    .panel {
      border-radius: 1.4rem;
      border: 1px solid var(--line);
      background: rgba(2, 6, 23, 0.12);
      box-shadow: 0 18px 42px rgba(2, 6, 23, 0.18);
      backdrop-filter: blur(14px);
    }

    .header {
      grid-area: header;
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
      padding: 1rem 1.15rem;
    }

    .eyebrow {
      margin: 0;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 0.3rem 0 0;
      font-size: clamp(1.8rem, 4vw, 2.9rem);
      letter-spacing: -0.05em;
    }

    .headline {
      padding: 0.75rem 0.9rem;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(34, 211, 238, 0.16), rgba(139, 92, 246, 0.12));
      font-size: 0.82rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .frame {
      grid-area: frame;
      position: relative;
      overflow: hidden;
      border-radius: 1.9rem;
      border: 2px solid rgba(34, 211, 238, 0.6);
      box-shadow: inset 0 0 0 1px rgba(139, 92, 246, 0.45);
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 1.1rem;
      border-radius: 1.3rem;
      border: 1px dashed rgba(139, 92, 246, 0.38);
      background:
        radial-gradient(circle at top left, rgba(34, 211, 238, 0.14), transparent 28%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
    }

    .frame-title {
      position: absolute;
      top: 1.4rem;
      left: 1.4rem;
      padding: 0.65rem 0.8rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-size: 0.78rem;
    }

    .sidebar {
      grid-area: sidebar;
      padding: 1rem;
      display: grid;
      gap: 0.8rem;
      align-content: start;
    }

    .sidebar-item {
      padding: 0.9rem;
      border-radius: 1.1rem;
      border: 1px solid rgba(34, 211, 238, 0.18);
      background: rgba(255, 255, 255, 0.05);
      line-height: 1.5;
    }

    .footer {
      grid-area: footer;
      padding: 0.9rem 1.1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
    }

    .footer-chip {
      padding: 0.55rem 0.8rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header panel">
      <div>
        <p class="eyebrow" id="subtitle">Music Pulse Suite</p>
        <h1 id="title">Music Pulse Live Frame</h1>
      </div>
      <div class="headline" id="headline">Performance-ready motion for music streams</div>
    </div>
    <div class="frame" aria-label="Music Pulse live frame overlay">
      <div class="frame-title">Music Pulse</div>
    </div>
    <div class="sidebar panel" id="items">
      <div class="sidebar-item">Opening countdown and crowd warm-up</div>
<div class="sidebar-item">Main set, showcase, or live breakdown</div>
<div class="sidebar-item">Short transition between segments</div>
    </div>
    <div class="footer panel" id="chips">
      <span class="footer-chip">Now playing</span>
<span class="footer-chip">Next up</span>
<span class="footer-chip">Live signal</span>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const title = params.get('title');
    const subtitle = params.get('subtitle');
    const headline = params.get('headline');
    const accent = params.get('accent');
    const items = params.get('items');
    if (title) document.getElementById('title').textContent = title;
    if (subtitle) document.getElementById('subtitle').textContent = subtitle;
    if (headline) document.getElementById('headline').textContent = headline;
    if (accent) {
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--accent-secondary', accent);
      document.documentElement.style.setProperty('--accent-tertiary', accent);
    }
    if (items) {
      const list = items.split('|').map((entry) => entry.trim()).filter(Boolean);
      const sidebar = document.getElementById('items');
      const chips = document.getElementById('chips');
      sidebar.innerHTML = '';
      chips.innerHTML = '';
      list.forEach((entry) => {
        const card = document.createElement('div');
        card.className = 'sidebar-item';
        card.textContent = entry;
        sidebar.appendChild(card);
        const chip = document.createElement('span');
        chip.className = 'footer-chip';
        chip.textContent = entry;
        chips.appendChild(chip);
      });
    }
  </script>
</body>
</html>
