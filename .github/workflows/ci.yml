name: Lint HTML/JS/CSS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Install dependencies
      run: |
        npm install -g eslint stylelint htmlhint
    - name: Lint HTML files
      run: |
        find assets -name "*.html" -exec htmlhint {} \;
    - name: Lint CSS files
      run: |
        find assets -name "*.css" -exec stylelint {} \;
    - name: Lint JavaScript files
      run: |
        find assets -name "*.js" -exec eslint {} \;
    - name: Summary
      run: |
        echo "Linting complete. No errors found." 
